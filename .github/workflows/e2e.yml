name: E2E

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  preflight:
    name: Decide whether E2E can run
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}

    steps:
      - name: Check E2E prerequisites
        id: check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    name: Pi E2E smoke test
    needs: preflight
    if: ${{ needs.preflight.outputs.should-run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install pi CLI
        run: npm install --global @mariozechner/pi-coding-agent@0.67.68

      - name: Run E2E smoke test
        run: bash ./scripts/e2e-smoke.sh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PI_E2E_ISOLATE_AGENT_DIR: "1"

  e2e-skipped:
    name: E2E skipped
    needs: preflight
    if: ${{ needs.preflight.outputs.should-run != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain why E2E was skipped
        run: |
          echo "Skipping Pi E2E smoke test because GEMINI_API_KEY is not configured."
          echo "Add GEMINI_API_KEY as a repository or organization secret to enable this workflow."
