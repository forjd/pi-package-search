name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish package and verify npm install path
    if: ${{ secrets.NPM_TOKEN != '' && secrets.GEMINI_API_KEY != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run project checks
        run: npm run check

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm registry to serve the new version
        run: |
          set -euo pipefail
          VERSION="$(node -p \"JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version\")"
          for attempt in $(seq 1 18); do
            PUBLISHED_VERSION="$(npm view pi-package-search version 2>/dev/null || true)"
            if [ "$PUBLISHED_VERSION" = "$VERSION" ]; then
              echo "Published version $VERSION is live on npm."
              exit 0
            fi
            echo "Waiting for npm to serve $VERSION (attempt $attempt/18, saw '${PUBLISHED_VERSION:-<none>}')"
            sleep 10
          done
          echo "Timed out waiting for npm to serve version $VERSION" >&2
          exit 1

      - name: Install pi CLI
        run: npm install --global @mariozechner/pi-coding-agent@0.67.68

      - name: Run published-package E2E smoke test
        run: bash ./scripts/e2e-smoke.sh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PI_E2E_ISOLATE_AGENT_DIR: "1"
          PI_PACKAGE_SEARCH_SOURCE: npm:pi-package-search

  publish-skipped:
    name: Publish skipped
    if: ${{ secrets.NPM_TOKEN == '' || secrets.GEMINI_API_KEY == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain why publish was skipped
        run: |
          echo "Skipping publish workflow."
          echo "Required secrets: NPM_TOKEN and GEMINI_API_KEY."
