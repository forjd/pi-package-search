name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: Create release PRs and publish tagged releases
    runs-on: ubuntu-latest

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check out repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Run project checks
        if: ${{ steps.release.outputs.release_created }}
        run: npm run check

      - name: Publish to npm with trusted publishing
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance --access public

      - name: Wait for npm registry to serve the new version
        if: ${{ steps.release.outputs.release_created }}
        run: |
          set -euo pipefail
          VERSION="$(node -p \"JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version\")"
          for attempt in $(seq 1 18); do
            PUBLISHED_VERSION="$(npm view pi-package-search version 2>/dev/null || true)"
            if [ "$PUBLISHED_VERSION" = "$VERSION" ]; then
              echo "Published version $VERSION is live on npm."
              exit 0
            fi
            echo "Waiting for npm to serve $VERSION (attempt $attempt/18, saw '${PUBLISHED_VERSION:-<none>}')"
            sleep 10
          done
          echo "Timed out waiting for npm to serve version $VERSION" >&2
          exit 1
